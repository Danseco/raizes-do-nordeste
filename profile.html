<!DOCTYPE html>
<html lang="pr-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="src/styles/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://unpkg.com/scrollreveal"></script>
    
    <title>Profile</title>
</head>

<body>
    <section id="my_account">
        <div id="container-profile">
            <h1 class="login_title">Meu perfil</h1>
            <h2 id="bemVindo"></h2>
            <p>Seus dados:</p>
            
            <label>Nome</label>
            <input type="text" id="nomeLogin" disabled>

            <label>Email</label>
            <input type="email" id="emailLogin" disabled>

            <label>CPF</label>
            <input type="cpf" id="cpfLogin" disabled>

            <label>Telefone</label>
            <input type="text" id="telefoneLogin" disabled>

            <label>Endereço</label>
            <input type="text" id="enderecoLogin" disabled>

            <p id="planoFidelidadeStatus"></p>

            <button id="btn-edit" class="button3">
                Editar Perfil
            </button>

            <button id="btn-save" class="button1" style="display:none;">
                Salvar Alterações
            </button>

            <button id="btn-delete-account" class="button3" style="display:none;">
                Excluir Conta
            </button>

            <div id="my_orders">
                <h2 id="order_title" class="login_title"></h2>
                <p id="order_date"></p>
                <p id="itens_title"></p>
                <ul id="order_itens"></ul>
                <p id="order_total"></p>
                <p id="order_delivery"></p>
                <p id="order_address"></p>
                <p id="order_franquia"></p>
            </div>

            <div id="button_menu">
                <a href="index.html">
                    <i class="fa-solid fa-house"></i>
                </a>
            </div>
            <button onclick="logout()" class="button3">
                Sair
            </button>
        </div>
    </section>

    <script src="src/javascript/profile.js"></script>
</body>
</html>
