<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="src/styles/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://unpkg.com/scrollreveal"></script>
    <title>Pedido</title>
</head>
<body>
    <!-- Pagina de Pedido -->
    <section id="order_page">
        <div id="container-order">
            <h1 class="login_title">Pedido</h1>

            <!-- Seleciona o tipo de envio e franquia -->
            <h3>Tipo de envio:<h3>
            <div class="shipping_group">
                <div class="shipping_option">
                    <label>
                        <input type="radio" name="entrega" value="retirada" checked>
                        Retirar no balcão
                    </label>

                    <label>
                        <input type="radio" name="entrega" value="domicilio">
                        Entrega domiciliar
                    </label>
                </div>
            </div>

            <!-- Franquias disponíveis -->
            <div class="franquia_group">
                <h3>Selecione a Franquia:</h3>
                <select id="franquia_option">
                    <option value="belem">Nazaré, Belém - PA</option>
                    <option value="recife">Boa Vista, Recife - PE</option>
                    <option value="brasilia">Asa Sul, Brasília - DF</option>
                    <option value="saoPaulo">Consolação, São Paulo - SP</option>
                    <option value="curitiba">Água Verde, Curitiba - PR</option>
                </select>
            </div>
            <p>Endereço<span id="delivery_address"></span></p>
            <p>Subtotal: <span id="subtotal"></span></p>
            <p>Frete: <span id="frete"></span></p>
            <p>Desconto: <span id="desconto"></span></p>
            <p>Total: <span id="total"></span></p>

            <button id="btn-finish" class="button1">
                Pagamento
            </button>

            <button id="btn-cancel" class="button3">
                Cancelar
            </button>
            
            <!-- Termos de uso, política de privacidade e LGPD -->
            <p>Seus dados estão seguros! <a class="termosUso" href="termos.html">Política de Privacidade</a>.</p>
        </div>

    </section>

    <script src="src/javascript/order.js"></script>
</body>
</html>
